# Macros for setting the status leds on the Voron StealthBurner toolhead (or for any neopixel-type leds).
#
# You will need to configure a neopixel (or other addressable led, such as dotstar). See
# https://www.klipper3d.org/Config_Reference.html#neopixel for configuration details.


#####################################
#           INSTRUCTIONS            #
#####################################
# How to use all this stuff:
#
#     1.  Copy this .cfg file into your Klipper config directory and then add [include stealthburner_leds.cfg]
#         to the top of your printer.cfg in order to register the LEDs and macros with Klipper.
#     2.  Define your LEDs by editing [neopixel sb_leds] below and entering the data pin from your control board
#         as well as the color order.
#
#           Note: RGB and RGBW are different and must be defined explicitly.  RGB and RGBW are also not able to 
#                 be mix-and-matched in the same chain. A separate data line would be needed for proper functioning.
#
#                 RGBW LEDs will have a visible yellow-ish phosphor section to the chip.  If your LEDs do not have
#                 this yellow portion, you have RGB LEDs.
#
#     3.  Save your config and restart Klipper.
#
#           Note: We set RED and BLUE to 1.0 to make it easier for users and supporters to detect 
#                 misconfigurations or miswiring. The default color format is for Neopixels with a dedicated 
#                 white LED. On startup, all three SB LEDs should light up.
#
#                 If you get random colors across your LEDs, change the color_order to GRB and restart. Then
#                 omit the W for each suggested color_order in the next paragraph.
#
#                 If you get MAGENTA, your  color order is correct. If you get CYAN, you need to use RGBW. If
#                 you get YELLOW, you need to use BRGW (note that BRG is only supported in the latest Klipper
#                 version).
#
#     4.  Once you have confirmed that the LEDs are set up correctly, you must now decide where you want 
#         these macros called up...which means adding them to your existing gcode macros.  NOTHING will happen
#         unless you add the STATUS_????? macros to your existing gcode macros.  
#
#           Example: add STATUS_LEVELING to the beginning of your QGL gcode macro, and then add STATUS_READY 
#                    to the end of it to set the logo LED and nozzle LEDs back to the `ready` state.
#
#           Example: add STATUS_CLEANING to the beginning of your nozzle-cleaning macro, and then STATUS_READY
#                    to the end of it to return the LEDs back to `ready` state.
#
#     5.  Feel free to change colors of each macro, create new ones if you have a need to.  The macros provided below
#         are just an example of what is possible.  If you want to try some more complex animations, you will most
#         likely have to use WLED with Moonraker and a small micro-controller 
#
#####################################
#       END INSTRUCTRUCTIONS        #
#####################################


[neopixel sb_leds]
pin: nhk:gpio7
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0
#   Sets the initial LED color of the Neopixel. Each value should be
#   between 0.0 and 1.0. The WHITE option is only available on RGBW
#   LEDs. The default for each color is 0.#

# Most configuration for the macros can be done by modifying the variables in the _sb_vars macro
# at the start of this file.

##########
# MACROS #
##########

# The following status macros are available (these go inside of your macros):
#
#    STATUS_READY
#    STATUS_OFF
#    STATUS_BUSY
#    STATUS_HEATING
#    STATUS_LEVELING
#    STATUS_HOMING
#    STATUS_CLEANING
#    STATUS_MESHING
#    STATUS_CALIBRATING_Z
#
# With additional macros for basic control:
#
#    SET_NOZZLE_LEDS_ON
#    SET_LOGO_LEDS_OFF
#    SET_NOZZLE_LEDS_OFF
#
# Contributed by Voron discord users wile.e, Tetsunosuke, and etherwalker


# stealthburner_leds.cfg — Custom colors for Matt's Voron 2.4
# Logo LED = INDEX 1 (top)
# Nozzle LEDs = INDEX 2,3 (bottom two)

# stealthburner_leds.cfg — Direct SET_LED (no helpers)
# INDEX 1 = logo, INDEX 2,3 = nozzle
# Color order: GRB (no white channel)

# Heating: logo red, nozzle orange
# Blink loop for pause
[delayed_gcode _pause_blink_loop]
gcode:
    {% if printer["gcode_macro _PAUSE_BLINK"].blink_state == 0 %}
        SET_LED LED=sb_leds RED=1.0 GREEN=0.0 BLUE=0.0 TRANSMIT=1
        SET_GCODE_VARIABLE MACRO=_PAUSE_BLINK VARIABLE=blink_state VALUE=1
    {% else %}
        SET_LED LED=sb_leds RED=1.0 GREEN=0.35 BLUE=0.0 TRANSMIT=1
        SET_GCODE_VARIABLE MACRO=_PAUSE_BLINK VARIABLE=blink_state VALUE=0
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0.5

[gcode_macro _PAUSE_BLINK]
variable_blink_state: 0
gcode:
    # Holds blink state

# Heating: logo red, nozzle orange
[gcode_macro STATUS_HEATING]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=1.0 GREEN=0.0 BLUE=0.0 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=1.0 GREEN=0.35 BLUE=0.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=1.0 GREEN=0.35 BLUE=0.0 INDEX=3 TRANSMIT=1

# Cooling: all royal blue
[gcode_macro STATUS_COOLING]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.1 GREEN=0.1 BLUE=1.0 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.1 GREEN=0.1 BLUE=1.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.1 GREEN=0.1 BLUE=1.0 INDEX=3 TRANSMIT=1

# Printing: logo teal, nozzle white
[gcode_macro STATUS_PRINTING]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.5 BLUE=0.5 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=1.0 GREEN=1.0 BLUE=1.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=1.0 GREEN=1.0 BLUE=1.0 INDEX=3 TRANSMIT=1

# Meshing: all green
[gcode_macro STATUS_MESHING]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.0 GREEN=1.0 BLUE=0.0 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.0 GREEN=1.0 BLUE=0.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.0 GREEN=1.0 BLUE=0.0 INDEX=3 TRANSMIT=1

# Leveling/QGL: all purple
[gcode_macro STATUS_LEVELING]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.5 GREEN=0.0 BLUE=1.0 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.5 GREEN=0.0 BLUE=1.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.5 GREEN=0.0 BLUE=1.0 INDEX=3 TRANSMIT=1

# Homing: green-ish
[gcode_macro STATUS_HOMING]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.6 BLUE=0.2 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.6 BLUE=0.2 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.6 BLUE=0.2 INDEX=3 TRANSMIT=1

# Ready: logo teal, nozzle white
[gcode_macro STATUS_READY]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.5 BLUE=0.5 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=1.0 GREEN=1.0 BLUE=1.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=1.0 GREEN=1.0 BLUE=1.0 INDEX=3 TRANSMIT=1

# Busy: dim red all
[gcode_macro STATUS_BUSY]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.4 GREEN=0.0 BLUE=0.0 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.4 GREEN=0.0 BLUE=0.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.4 GREEN=0.0 BLUE=0.0 INDEX=3 TRANSMIT=1

# Off: all off
[gcode_macro STATUS_OFF]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.0 BLUE=0.0 INDEX=1 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.0 BLUE=0.0 INDEX=2 TRANSMIT=0
    SET_LED LED=sb_leds RED=0.0 GREEN=0.0 BLUE=0.0 INDEX=3 TRANSMIT=1

# Pause: start blink loop
[gcode_macro STATUS_PAUSE]
gcode:
    SET_GCODE_VARIABLE MACRO=_PAUSE_BLINK VARIABLE=blink_state VALUE=0
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0.1

# Cancel: all red for 1 minute, then off
[gcode_macro STATUS_CANCEL]
gcode:
    UPDATE_DELAYED_GCODE ID=_pause_blink_loop DURATION=0
    SET_LED LED=sb_leds RED=1.0 GREEN=0.0 BLUE=0.0 TRANSMIT=1
    G4 P60000
    STATUS_OFF