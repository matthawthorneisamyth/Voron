[include mainsail.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
[include stealthburner_leds.cfg]
[include nitehawk-36.cfg]
[include tmc_autotune.cfg]
#[include adxl_bed.cfg]
#####################################################################
#   MCU — Voron Switchwire 
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_58002B000C50415833323420-if00

[printer]
kinematics: corexz
max_velocity: 250
max_accel: 3000
max_z_velocity: 25
max_z_accel: 1500

#####################################################################
#   X Stepper Settings — Sensorless Homing
#####################################################################

[stepper_x]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
rotation_distance: 40.02
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 250
position_max: 250
position_min: 0
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.8
interpolate: True
stealthchop_threshold: 999999
diag_pin: ^PC0
driver_SGTHRS: 90

#####################################################################
#   Y Stepper Settings — Sensorless Homing
#####################################################################

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
rotation_distance: 40.07
full_steps_per_rotation: 200
microsteps: 32
# endstop_pin: PC1
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 250
position_min: 0
position_max: 250
homing_speed: 60
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.7
interpolate: True
stealthchop_threshold: 999999
diag_pin: ^PC1
driver_SGTHRS: 90

#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -10
homing_speed: 10
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.6
interpolate: True
stealthchop_threshold: 999999

#####################################################################
#   Extruder — on Nitehawk 36 (Rapido UHF 0.6mm)
#####################################################################

## See nitehawk-36.cfg

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PC9
sensor_type: Generic 3950
sensor_pin: PC4
smooth_time: 3.0
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

#####################################################################
#   Probe — Beacon (Contact Homing)
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_6D3581324E5737374D202020FF0F3540-if00
x_offset: 0
y_offset: 18
mesh_main_direction: x
mesh_runs: 2
contact_max_hotend_temperature: 250
home_xy_position: 125, 125
home_z_hop: 5
home_z_hop_speed: 15
home_xy_move_speed: 200
home_method: contact
home_method_when_homed: proximity
home_autocalibrate: unhomed

#####################################################################
#   Chamber Thermistor
#####################################################################

[thermistor Trianglelab-NTC100K-B3950]
temperature1: 25
resistance1: 103180
temperature2: 150
resistance2: 1366.2
temperature3: 250
resistance3: 168.6

[temperature_sensor chamber]
sensor_type: Trianglelab-NTC100K-B3950
sensor_pin: PA0

#####################################################################
#   Resonance Tester
#####################################################################

[resonance_tester]
accel_chip_x: beacon
accel_chip_y: beacon
#accel_chip_y: adxl345 bed #remove comment here and comment out accel_chip_y: beacon when RP2040 rig attached 
probe_points:
    125, 125, 20   # center of your bed, adjust as needed
    
#####################################################################
#   Fan Control
#####################################################################

## Print cooling fan and hotend fan are on Nitehawk 36 (see nitehawk-36.cfg)

## Electronics Fan
[controller_fan Main_Board]
pin: PC7
max_power: 1.00
kick_start_time: 0.200
heater: heater_bed

## Nevermore Filter
[fan_generic Nevermore]
pin: PB15
max_power: 1.0
kick_start_time: 0.5

#####################################################################
#   Temperature Sensors
#####################################################################

[temperature_sensor RPi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100
gcode_id: PI

#####################################################################
#   Bed Mesh
#####################################################################

[bed_mesh]
## HEY MATT,
## YOU DUMB BASTARD -- Don't change these settings. They aren't going to give you more bed space or speed.
## The PROBE area is not the same as the overall BED AREA in the slicer.
## The Switchwire bed is 235(x) x 235 (y) -- This is your slicer setting
## The MESH setting is below. (25, 25, MIN ; 195, 195 MAX)
## IF YOU GO BIGGER THAN THE MESH SETTING HERE A BED_MESH_PROBE WILL CAUSE A CRASH
## And it'll ruin your nozzle. Dummy.
## --LOVE MATT
speed: 150
horizontal_move_z: 10
mesh_min: 25, 25
mesh_max: 235, 220
probe_count: 30, 30
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
mesh_pps: 0, 0
zero_reference_position: 125, 125

#####################################################################
#   Firmware Retraction
#####################################################################

[firmware_retraction]
retract_length: .6
retract_speed: 120
unretract_extra_length: 0
unretract_speed: 120

#####################################################################
# Input Shaper
#####################################################################

[input_shaper]
shaper_type_x: ei
shaper_freq_x: 77.6
shaper_type_y: 2hump_ei
shaper_freq_y: 59

#####################################################################
# Heater Verification -- Adjusted to Combat Longer Temp Errors
#####################################################################

[verify_heater heater_bed]
max_error: 200
check_gain_time: 120
hysteresis: 10
heating_gain: 1

[verify_heater extruder]
max_error: 200
check_gain_time: 30
hysteresis: 5
heating_gain: 2

#####################################################################
# Shake & Tune
#####################################################################

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 10
keep_raw_data: False
show_macros_in_webui: True
timeout: 600
measurements_chunk_size: 2
max_freq: 200
dpi: 300

#####################################################################
#   Misc
#####################################################################

[gcode_arcs]
resolution: 1.0

[skew_correction]

[exclude_object]

