#####################################################################
# macros.cfg — Voron 2.4 350mm Macro Set
#####################################################################

#####################################################################
# Variables
#####################################################################

[gcode_macro _PRINT_VARIABLES]
variable_x_center: 175
variable_y_center: 175
variable_max_z: 340

# Per-filament pressure advance — tune with PA test prints
variable_pa_pla: 0.03
variable_pa_petg: 0.035
variable_pa_abs: 0.025
variable_pa_asa: 0.025
variable_pa_tpu: 0.06
gcode:
    # This macro just holds variables

#####################################################################
# Print Start / End
#####################################################################

[gcode_macro PRINT_START]
description: Full print start sequence for Voron 2.4 350mm
gcode:
    {% set target_bed = params.BED|default(60)|int %}
    {% set target_extruder = params.EXTRUDER|default(200)|int %}
    {% set target_chamber = params.CHAMBER|default(0)|int %}
    {% set filament = params.FILAMENT|default("PLA")|string|upper %}
    {% set x_center = printer["gcode_macro _PRINT_VARIABLES"].x_center %}
    {% set y_center = printer["gcode_macro _PRINT_VARIABLES"].y_center %}
    {% set vars = printer["gcode_macro _PRINT_VARIABLES"] %}

    # --- Set pressure advance for filament type ---
    {% if filament == "PLA" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_pla}
    {% elif filament == "PETG" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_petg}
    {% elif filament == "ABS" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_abs}
    {% elif filament == "ASA" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_asa}
    {% elif filament == "TPU" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_tpu}
    {% else %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_pla}
    {% endif %}
    RESPOND MSG="PA set for {filament}"

    SET_GCODE_OFFSET Z=0                                 # Set offset to 0

    # --- Auto Nevermore for VOC-producing filaments ---
    {% if filament in ["ABS", "ASA", "PC"] %}
        NEVERMORE_ON
        RESPOND MSG="Nevermore ON (VOC filtering for {filament})"
    {% else %}
        NEVERMORE_OFF
        RESPOND MSG="Nevermore OFF (no VOCs for {filament})"
    {% endif %}

    # --- Reset state ---
    M117 Initializing...
    RESPOND MSG="Knocking off the cobwebs"
    CLEAR_PAUSE
    BED_MESH_CLEAR

    # --- Conditional home ---
    {% if "xyz" not in printer.toolhead.homed_axes %}
        M117 Homing...
        RESPOND MSG="Honing all axes"
        STATUS_HOMING
        G28
    {% else %}
        RESPOND MSG="Already homed — skipping"
    {% endif %}
    G90

    # --- Heat bed + preheat nozzle ---
    M117 Heating bed to {target_bed}C...
    RESPOND MSG="Heating bed to {target_bed}C"
    START_CHAMBER_FAN_CONTROL
    STATUS_HEATING
    M104 S150
    G1 X{x_center} Y{y_center} Z15 F9000
    M190 S{target_bed}

    {% if target_chamber > 0 %}
        M117 Waiting for chamber: {target_chamber}C...
        RESPOND MSG="Chamber soak: waiting for {target_chamber}C"
        TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}
        M107
    {% elif target_bed > 80 %}
        M117 Mormonizing (10 min)...
        RESPOND MSG="High-temp soak: 10 minutes (ABS/ASA)"
        G4 P600000
        M107
    {% else %}
        M117 Mormonizing (5 min)...
        RESPOND MSG="Low-temp soak: 5 minutes (PLA/PETG)"
        G4 P300000
    {% endif %}

    # --- Beacon preheat for QGL ---
    M117 Preheating nozzle to 150C...
    RESPOND MSG="Heating nozzle to 150C for QGL"
    STATUS_HEATING
    M109 S150

    # --- Scrub + Beacon contact at 150C (stable temp) ---
    M117 Scrubbing nozzle...
    RESPOND MSG="Scrub-a-dub-dub"
    NOZZLE_SCRUB
    M117 Z contact home...
    RESPOND MSG="Beacon contact home (clean nozzle, 150C — stable baseline)"
    STATUS_HOMING
    G28 Z METHOD=contact CALIBRATE=1

    # --- Gantry leveling ---
    M117 Leveling gantry...
    RESPOND MSG="Running Quad Gantry Level"
    STATUS_LEVELING
    QUAD_GANTRY_LEVEL

    # --- Fresh adaptive bed mesh every print ---
    M117 Bed mesh...
    RESPOND MSG="Running adaptive bed mesh"
    STATUS_MESHING
    BED_MESH_CALIBRATE ADAPTIVE=1 RUNS=2

    # --- Final nozzle heat ---
    M117 Heating nozzle to {target_extruder}C...
    RESPOND MSG="Heating nozzle to {target_extruder}C"
    STATUS_HEATING
    G1 X{x_center} Y{y_center} Z15 F9000
    M107
    M109 S{target_extruder}

    # --- Final nozzle wipe (clear ooze before printing) ---
    M117 Final nozzle wipe...
    RESPOND MSG="Wiping ooze before print"
    NOZZLE_SCRUB
    SET_GCODE_OFFSET Z=0.068

    # --- Ready to print (skirt handles purge) ---
    STATUS_PRINTING
    G90
    G1 Z5.0 F3000
    M117 Printing
    RESPOND MSG="Let's hope this works..."

  
[gcode_macro PRINT_END]
description: End print cleanup for Voron 2.4 350mm
gcode:
    {% set max_z = printer["gcode_macro _PRINT_VARIABLES"].max_z %}
    {% set act_z = printer.toolhead.position.z %}
    {% set lift_z = 10 %}

    {% if act_z < (max_z - lift_z) %}
        {% set z_safe = lift_z %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}

    # --- Retract and lift ---
    G91
    G1 E-18 F800  #18mm retraction for better nozzle cleaning
    G1 Z{z_safe} F3000

    # --- Park ---
    G90
    G0 X175 Y340 F6000

    # --- Shut down ---
    TURN_OFF_HEATERS
    M107
    M84
    BED_MESH_CLEAR

    # --- Nevermore cooldown ---
    NEVERMORE_FILTER_COOLDOWN
    STOP_CHAMBER_FAN_CONTROL
    SET_FAN_SPEED FAN=exhaust_fan SPEED=1.0
    STATUS_OFF

#####################################################################
# Pause / Resume / Cancel
#####################################################################

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
description: Pause print with retract and park
variable_retract: 1.0
variable_z_lift: 10
variable_x_park: 175
variable_y_park: 340
gcode:
    {% set retract = printer["gcode_macro PAUSE"].retract %}
    {% set z_lift = printer["gcode_macro PAUSE"].z_lift %}
    {% set x_park = printer["gcode_macro PAUSE"].x_park %}
    {% set y_park = printer["gcode_macro PAUSE"].y_park %}
    {% set max_z = printer["gcode_macro _PRINT_VARIABLES"].max_z %}
    {% set act_z = printer.toolhead.position.z %}

    BASE_PAUSE

    # --- Retract ---
    G91
    G1 E-{retract} F2700

    # --- Lift Z ---
    {% if (act_z + z_lift) < max_z %}
        G1 Z{z_lift} F3000
    {% endif %}

    # --- Park ---
    G90
    G0 X{x_park} Y{y_park} F6000
    STATUS_READY

[gcode_macro RESUME]
rename_existing: BASE_RESUME
description: Resume print with unretract
gcode:
    {% set retract = printer["gcode_macro PAUSE"].retract %}

    G91
    G1 E{retract} F2700
    G90
    STATUS_PRINTING
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
description: Cancel print with cleanup
gcode:
    TURN_OFF_HEATERS
    M107
    G91
    G1 E-5 F2700
    G1 Z10 F3000
    G90
    G0 X150 Y290 F6000
    M84
    BED_MESH_CLEAR
    NEVERMORE_OFF
    STATUS_OFF
    BASE_CANCEL_PRINT

[gcode_macro M600]
description: Filament change (pause + unload)
gcode:
    PAUSE
    UNLOAD_FILAMENT

#####################################################################
# QGL + Home
#####################################################################

[gcode_macro QGL_HOME]
description: Quad gantry level then re-home Z
gcode:
    BED_MESH_CLEAR
    STATUS_HOMING
    G28
    STATUS_LEVELING
    QUAD_GANTRY_LEVEL
    STATUS_HOMING
    G28 Z

#####################################################################
# Filament Load / Unload
#####################################################################

[gcode_macro LOAD_FILAMENT]
description: Heat and load filament
variable_temp: 245
variable_load_dist: 100
gcode:
    {% set temp = params.TEMP|default(printer["gcode_macro LOAD_FILAMENT"].temp)|int %}
    {% set load_dist = printer["gcode_macro LOAD_FILAMENT"].load_dist %}

    STATUS_HEATING
    M109 S{temp}
    STATUS_BUSY
    M83
    G1 E{load_dist} F300
    G1 E25 F150
    G92 E0
    M82
    STATUS_READY

[gcode_macro UNLOAD_FILAMENT]
description: Heat and unload filament
variable_temp: 245
variable_unload_dist: 100
gcode:
    {% set temp = params.TEMP|default(printer["gcode_macro UNLOAD_FILAMENT"].temp)|int %}
    {% set unload_dist = printer["gcode_macro UNLOAD_FILAMENT"].unload_dist %}

    STATUS_HEATING
    M109 S{temp}
    STATUS_BUSY
    M83
    G1 E10 F300
    G1 E-{unload_dist} F1200
    G92 E0
    M82
    STATUS_READY

#####################################################################
# Nozzle Scrub — Randomized
#####################################################################

[gcode_macro NOZZLE_SCRUB]
description: Wipe nozzle on scrub pad with randomized start position
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        { action_raise_error("CANNOT SCRUB NOZZLE: Printer not homed! Run G28 first.") }
    {% endif %}

    # ---------- CONFIG ----------
    {% set brush_start_x = 266 %}
    {% set brush_end_x = 310 %}
    {% set brush_y = 349 %}
    {% set brush_z = 1.8 %}
    {% set wipe_count = 10 %}
    {% set travel_speed = 10000 %}
    {% set wipe_speed = 10000 %}

    # ---------- RANDOMIZE ----------
    {% set rand = (printer.system_stats.cputime * 1000)|int % 10 %}
    {% set offset_x = (rand * (brush_end_x - brush_start_x) / 30)|float %}
    {% set rand_start = brush_start_x + offset_x %}

    SAVE_GCODE_STATE NAME=nozzle_scrub
    G90

    G1 Z10 F3000
    G1 X{rand_start} Y{brush_y} F{travel_speed}
    G1 Z{brush_z} F3000

    {% for i in range(wipe_count) %}
        G1 X{brush_end_x} F{wipe_speed}
        G1 X{brush_start_x} F{wipe_speed}
    {% endfor %}

    G1 Z10 F3000

    RESTORE_GCODE_STATE NAME=nozzle_scrub
    SET_DISPLAY_TEXT MSG="Nozzle scrubbed"

#####################################################################
# Nevermore Filter
#####################################################################

[gcode_macro NEVERMORE_ON]
description: Turn on Nevermore carbon filter fan
gcode:
    UPDATE_DELAYED_GCODE ID=_NEVERMORE_COOLDOWN_TIMER DURATION=0
    SET_FAN_SPEED FAN=nevermore SPEED=1.0

[gcode_macro NEVERMORE_OFF]
description: Turn off Nevermore carbon filter fan
gcode:
    UPDATE_DELAYED_GCODE ID=_NEVERMORE_COOLDOWN_TIMER DURATION=0
    SET_FAN_SPEED FAN=nevermore SPEED=0

[delayed_gcode _NEVERMORE_COOLDOWN_TIMER]
initial_duration: 0
gcode:
   NEVERMORE_OFF
    RESPOND MSG="Nevermore cooldown complete — filter off"

[gcode_macro NEVERMORE_FILTER_COOLDOWN]
description: Run Nevermore for cooldown period then shut off (non-blocking)
variable_cooldown_time: 600
gcode:
    NEVERMORE_ON
    UPDATE_DELAYED_GCODE ID=_NEVERMORE_COOLDOWN_TIMER DURATION={printer["gcode_macro NEVERMORE_FILTER_COOLDOWN"].cooldown_time}
    RESPOND MSG="Nevermore cooldown: {printer['gcode_macro NEVERMORE_FILTER_COOLDOWN'].cooldown_time}s remaining (non-blocking)"
#####################################################################
# Chamber Exhaust Fan Control
#####################################################################

[delayed_gcode _CHECK_CHAMBER_TEMP]
initial_duration: 0
gcode:
    {% set chamber_temp = printer["temperature_sensor chamber"].temperature %}
    {% set target = 55 %}
    {% if chamber_temp > target + 1 %}
        SET_FAN_SPEED FAN=exhaust_fan SPEED=1.0
    {% elif chamber_temp < target - 1 %}
        SET_FAN_SPEED FAN=exhaust_fan SPEED=0
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_CHECK_CHAMBER_TEMP DURATION=10

[gcode_macro START_CHAMBER_FAN_CONTROL]
gcode:
    UPDATE_DELAYED_GCODE ID=_CHECK_CHAMBER_TEMP DURATION=10

[gcode_macro STOP_CHAMBER_FAN_CONTROL]
gcode:
    UPDATE_DELAYED_GCODE ID=_CHECK_CHAMBER_TEMP DURATION=0
    SET_FAN_SPEED FAN=exhaust_fan SPEED=0

#####################################################################
# Lights
#####################################################################

[gcode_macro LIGHTS_ON]
description: Turn on 24V LED lights
gcode:
    SET_PIN PIN=caselight VALUE=1.0

[gcode_macro LIGHTS_OFF]
description: Turn off 24V LED lights
gcode:
    SET_PIN PIN=caselight VALUE=0

[gcode_macro LIGHTS_DIM]
description: Dim 24V LED lights to 50%
gcode:
    SET_PIN PIN=caselight VALUE=0.5

[gcode_macro LIGHTS_TOGGLE]
description: Toggle 24V LED lights on/off
gcode:
    {% if printer["output_pin caselight"].value > 0 %}
        LIGHTS_OFF
    {% else %}
        LIGHTS_ON
    {% endif %}

#####################################################################
# Park
#####################################################################

[gcode_macro PARK]
description: Park toolhead at rear center
variable_z: 50
gcode:
    {% set z = params.Z|default(printer["gcode_macro PARK"].z)|float %}
    G90
    G0 X175 Y340 Z{z} F6000

#####################################################################
# Mesh Generation Helper
#####################################################################

[gcode_macro GENERATE_FILAMENT_MESH]
description: Heat bed to filament temp, soak, then save a named mesh
gcode:
    {% set filament = params.FILAMENT|default("PLA")|string|upper %}
    {% set temps = {"PLA": 60, "PETG": 80, "ABS": 110, "ASA": 110, "TPU": 60} %}
    {% set bed_temp = temps[filament]|default(60)|int %}
    {% set soak_ms = 600000 if bed_temp > 90 else 300000 %}
    {% set mesh_name = "mesh_" ~ filament %}

    G28
    M190 S{bed_temp}
    RESPOND MSG="Soaking at {bed_temp}C for {filament}..."
    G4 P{soak_ms}

    RESPOND MSG="Running QGL..."
    QUAD_GANTRY_LEVEL
    G28 Z

    RESPOND MSG="Meshing for {filament}..."
    BED_MESH_CALIBRATE
    BED_MESH_PROFILE SAVE={mesh_name}
    BED_MESH_PROFILE REMOVE=default
    SAVE_CONFIG

    RESPOND MSG="Mesh '{mesh_name}' saved! Klipper will restart."

[gcode_macro T0]
gcode:

