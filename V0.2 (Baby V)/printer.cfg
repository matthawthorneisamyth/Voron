[include mainsail.cfg]

# Voron 0.2 — BTT Manta M4P + Klipper Expander
# Dragon UHF 0.4mm | Sherpa Mini (Moons) | Dragonburner
# Firmware: STM32G0B1, 8KiB bootloader, USB communication
#
# Migrated from SKR Pico — same hardware, new board
# Boot race issue (Pi+Pico UART) eliminated — CB1 onboard
#
# === OrcaSlicer Speed Profile (from May 5 tuning) ===
# Input shaper: X=EI@103Hz (max 19330), Y=MZV@71Hz (max 14750)
# Outer wall: 120mm/s @ 5000 accel
# Inner wall: 200mm/s @ 8000 accel
# Top surface: 80mm/s @ 3000 accel
# Bottom surface: 40mm/s @ 2000 accel
# Sparse infill: 250mm/s @ 10000 accel
# Solid infill: 200mm/s @ 8000 accel
# Travel: 250mm/s @ 10000 accel
# Dragon UHF 0.4mm flow limit: ~20-24mm³/s


#####################################################################
#   MCU
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_5600450005504E5238363120-if00

[mcu expander]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_200016001453303755373220-if00

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

# CB1 temp sensor — uncomment if available on your OS image
[temperature_sensor CB1]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

#####################################################################
#   Printer
#####################################################################

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 10000                    # Was 2000 on SKR Pico — bumped for shaper headroom
max_z_velocity: 15
max_z_accel: 300
square_corner_velocity: 6.0

#####################################################################
#   X/Y Stepper Settings — Sensorless Homing
#####################################################################

## B Stepper - Left
[stepper_x]
step_pin: PC6
dir_pin: !PA14                       # Was gpio10 (no !). Check direction.
enable_pin: !PC7
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 120
position_max: 120
homing_speed: 20
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PB12
interpolate: false
run_current: 0.69
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PC0                     # DIAG pin — jumper required on M4P
driver_SGTHRS: 60

## A Stepper - Right
[stepper_y]
step_pin: PB10
dir_pin: !PB2                        # Was gpio5 (no !). Check direction.
enable_pin: !PB11
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 120
position_max: 120
position_min: 5
homing_speed: 20
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PC10
interpolate: false
run_current: 0.69
sense_resistor: 0.110
stealthchop_threshold: 0
diag_pin: ^PC1                     # DIAG pin — jumper required on M4P
driver_SGTHRS: 60

#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PB0
dir_pin: PC5                       # Was !gpio28 (inverted)
enable_pin: !PB1
rotation_distance: 8                # T8x8 lead screw
microsteps: 32
endstop_pin: ^PC2
#position_endstop: 120              # Calibrate with Z_ENDSTOP_CALIBRATE
position_max: 120
position_min: -1.5
homing_speed: 20
second_homing_speed: 3.0
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: PC9
interpolate: false
## Formbot Moons: 0.65A * 0.707 * 0.65 = 0.30A
run_current: 0.30
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Extruder — Sherpa Mini + Dragon UHF 0.4mm
#####################################################################

[extruder]
step_pin: PB3
dir_pin: !PB4                        # Was gpio13 (no !). Check direction.
enable_pin: !PD5
full_steps_per_rotation: 200
rotation_distance: 23.00805         # Calibrated value
gear_ratio: 50:10
microsteps: 32
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: PT1000           # Formbot Dragon UHF
sensor_pin: PA0
min_temp: -10
max_temp: 300
max_extrude_only_distance: 1400.0
max_extrude_only_velocity: 75.0
max_extrude_only_accel: 1500
min_extrude_temp: 170
pressure_advance: 0.03
pressure_advance_smooth_time: 0.040
#control: pid                       # Run PID_CALIBRATE HEATER=extruder TARGET=245
#pid_Kp: 28.182
#pid_Ki: 1.978
#pid_Kd: 100.397

[tmc2209 extruder]
uart_pin: PA13
interpolate: false
## Formbot Moons: 1A * 0.707 * 0.65 = 0.46A
run_current: 0.46
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PD8
sensor_type: Generic 3950
sensor_pin: PC4
smooth_time: 3.0
min_temp: 0
max_temp: 120
#control: pid                       # Run PID_CALIBRATE HEATER=heater_bed TARGET=60
#pid_kp: 68.453
#pid_ki: 2.749
#pid_kd: 426.122

#####################################################################
#   Fan Control
#####################################################################

## Part Cooling Fan — M4P FAN0
[fan]
pin: PD2
max_power: 1.0
kick_start_time: 0.5
off_below: 0.13
cycle_time: 0.001

## Hotend Fan — M4P FAN1
[heater_fan hotend_fan]
pin: PD3
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

## MCU/Electronics Fan — M4P FAN2
[controller_fan MCU_fan]
pin: PD4
max_power: 1.0
kick_start_time: 0.5
heater: extruder

#####################################################################
#   Klipper Expander
#####################################################################

## Nevermore — Expander MOSFET 0
[fan_generic nevermore]
pin: expander:PA3
max_power: 1.0
kick_start_time: 0.5

## Case Lights — Expander MOSFET 1
#[output_pin caselight]
#pin: expander:PA1
#pwm: true
#value: 0
#shutdown_value: 0
#cycle_time: 0.01

## Chamber Thermistor — Expander Thermistor 0
[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: expander:PA5

#####################################################################
#   Filament Runout Sensor
#####################################################################
# Was gpio16 on SKR Pico. Find the correct M4P pin for your wiring.

[filament_switch_sensor Filament_Runout_Sensor]
pause_on_runout: True
runout_gcode: PAUSE
switch_pin: ^PC15                  # M4P filament sensor pin

#####################################################################
#   Homing — Sensorless X/Y, Physical Z
#####################################################################

[idle_timeout]
timeout: 1800

[homing_override]
axes: xyz
set_position_z: 0
gcode:
    {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}
    SAVE_GCODE_STATE NAME=STATE_HOME_OVERRIDE

    {% if home_all or 'Z' in params %}
        _HOME_Z
    {% endif %}

    {% if home_all or 'X' in params %}
        _HOME_X
    {% endif %}

    {% if home_all or 'Y' in params %}
        _HOME_Y
    {% endif %}

    RESTORE_GCODE_STATE NAME=STATE_HOME_OVERRIDE

[bed_screws]
screw1: 60, 5
screw1_name: front screw
screw2: 5, 115
screw2_name: back left
screw3: 115, 115
screw3_name: back right

#####################################################################
#   Input Shaper
#####################################################################

[input_shaper]
shaper_type_x: ei
shaper_freq_x: 103.0
shaper_type_y: mzv
shaper_freq_y: 71.0

#####################################################################
#   Firmware Retraction
#####################################################################

[firmware_retraction]
retract_length: 0.4
retract_speed: 60
unretract_extra_length: 0
unretract_speed: 30

#####################################################################
#   Additional Features
#####################################################################

[exclude_object]

[skew_correction]

#####################################################################
#   Lighting & Lighting Macros
#####################################################################

[neopixel matchstick_left]
pin: PD0
chain_count: 10
color_order: GRBW
initial_RED: 0.3
initial_GREEN: 0.3
initial_BLUE: 0.3
initial_WHITE: 0.5

[neopixel matchstick_right]
pin: PD1
chain_count: 10
color_order: GRBW
initial_RED: 0.3
initial_GREEN: 0.3
initial_BLUE: 0.3
initial_WHITE: 0.5

[gcode_macro LIGHTS_ON]
gcode:
    {% set s = params.S|default(1.0)|float %}
    SET_LED LED=matchstick_left RED={s} GREEN={s} BLUE={s} WHITE={s}
    SET_LED LED=matchstick_right RED={s} GREEN={s} BLUE={s} WHITE={s}

[gcode_macro LIGHTS_OFF]
gcode:
    SET_LED LED=matchstick_left RED=0 GREEN=0 BLUE=0 WHITE=0
    SET_LED LED=matchstick_right RED=0 GREEN=0 BLUE=0 WHITE=0

[gcode_macro LIGHTS_WHITE]
gcode:
    {% set s = params.S|default(1.0)|float %}
    SET_LED LED=matchstick_left RED=0 GREEN=0 BLUE=0 WHITE={s}
    SET_LED LED=matchstick_right RED=0 GREEN=0 BLUE=0 WHITE={s}

[gcode_macro LIGHTS_TOGGLE]
gcode:
    {% if printer["neopixel matchstick_left"].color_data[0][3] > 0 %}
        LIGHTS_OFF
    {% else %}
        LIGHTS_ON
    {% endif %}

#####################################################################
#   Print Variables
#####################################################################

[gcode_macro _PRINT_VARIABLES]
variable_x_center: 60
variable_y_center: 60
variable_max_z: 120
# Per-filament pressure advance values — tune and update
variable_pa_pla: 0.02
variable_pa_petg: 0.02
variable_pa_abs: 0.03
variable_pa_asa: 0.03
variable_pa_tpu: 0.06
gcode:

#####################################################################
#   Macros — Sensorless Homing
#####################################################################

[gcode_macro _HOME_X]
gcode:
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT_RATIO = 0.7 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_Y}
    G28 X
    G91
    G1 X-10 F1200
    G4 P1000
    G90
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Y]
gcode:
    {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
    {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}
    {% set HOME_CURRENT_RATIO = 0.7 %}
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT_RATIO * RUN_CURRENT_Y}
    G28 Y
    G91
    G1 Y-10 F1200
    G4 P1000
    G90
    SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
    SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

[gcode_macro _HOME_Z]
gcode:
    G90
    G28 Z
    G1 Z30

#####################################################################
#   Macros — Print Start (Switchwire-style, adapted for V0.2)
#####################################################################
[gcode_macro PRINT_START]
description: Full print start sequence for Voron V0.2
gcode:
    {% set target_bed = params.BED_TEMP|default(60)|float %}
    {% set target_extruder = params.EXTRUDER_TEMP|default(205)|float %}
    {% set filament = params.FILAMENT|default("PLA")|string|upper %}
    {% set vars = printer["gcode_macro _PRINT_VARIABLES"] %}

    # --- Set pressure advance for filament type ---
    {% if filament == "PLA" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_pla}
    {% elif filament == "PETG" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_petg}
    {% elif filament == "ABS" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_abs}
    {% elif filament == "ASA" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_asa}
    {% elif filament == "TPU" %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_tpu}
    {% else %}
        SET_PRESSURE_ADVANCE ADVANCE={vars.pa_pla}
    {% endif %}
    RESPOND MSG="PA set for {filament}"

    # --- Auto Nevermore for VOC-producing filaments ---
    {% if filament in ["ABS", "ASA"] %}
        NEVERMORE_ON
        RESPOND MSG="Nevermore ON (VOC filtering for {filament})"
    {% else %}
        NEVERMORE_OFF
    {% endif %}

    # --- Reset state ---
    M117 Initializing...
    CLEAR_PAUSE
    SET_GCODE_OFFSET Z=0

    # --- Conditional home ---
    {% if "xyz" not in printer.toolhead.homed_axes %}
        M117 Homing...
        G28
    {% endif %}
    G90

    # --- Preheat nozzle to 150 to prevent ooze while bed heats ---
    M104 S150

    # --- Heat bed ---
    M117 Heating bed to {target_bed}C...
    G1 X{vars.x_center} Y{vars.y_center} Z15 F9000
    M190 S{target_bed}

    # --- Brief soak ---
    {% if target_bed > 90 %}
        M117 Heat soak (2 min)...
        RESPOND MSG="Brief soak for ABS/ASA (2 min)"
        G4 P120000
    {% else %}
        M117 Heat soak (30s)...
        G4 P30000
    {% endif %}

    # --- Heat nozzle to print temp ---
    M117 Heating nozzle to {target_extruder}C...
    G1 X60 Y5 Z20 F3000
    M109 S{target_extruder}

    # --- Purge line ---
    RESPOND MSG="Purging nozzle..."
    G1 Z0.3 F600
    G92 E0
    G1 X10 Y5 F3000
    G1 X110 Y5 E15 F1500
    G1 Z1.0 F600
    G92 E0

    # --- Ready ---
    G90
    M117 Printing
    RESPOND MSG="Print Started"

#####################################################################
#   Macros — Print End
#####################################################################

[gcode_macro PRINT_END]
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-4.0 F3600                 ; retract filament
    TURN_OFF_HEATERS               ; heaters off ASAP

    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    G90                            ; absolute positioning
    G1 Z{max_z - 10} F2000         ; drop bed all the way down
    G1 X{max_x / 2} Y{max_y - 10} F20000  ; park nozzle at rear center
    NEVERMORE_FILTER_COOLDOWN
    M107                           ; turn off part fan
    RESPOND MSG=">>> Print complete. Bed lowered, cooling down."
    M84                            ; disable steppers

#####################################################################
#   Macros — Filament
#####################################################################

[gcode_macro LOAD_FILAMENT]
gcode:
    M83
    G1 E100 F500
    G1 E15 F150
    M82

[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83
    G1 E10 F300
    G1 E-100 F500
    M82

#####################################################################
#   Macros — Nevermore
#####################################################################

[gcode_macro NEVERMORE_ON]
description: Turn on Nevermore carbon filter fan
gcode:
    UPDATE_DELAYED_GCODE ID=_NEVERMORE_COOLDOWN_TIMER DURATION=0
    SET_FAN_SPEED FAN=nevermore SPEED=1.0

[gcode_macro NEVERMORE_OFF]
description: Turn off Nevermore carbon filter fan
gcode:
    UPDATE_DELAYED_GCODE ID=_NEVERMORE_COOLDOWN_TIMER DURATION=0
    SET_FAN_SPEED FAN=nevermore SPEED=0

[delayed_gcode _NEVERMORE_COOLDOWN_TIMER]
initial_duration: 0
gcode:
    NEVERMORE_OFF
    RESPOND MSG="Nevermore cooldown complete — filter off"

[gcode_macro NEVERMORE_FILTER_COOLDOWN]
description: Run Nevermore for cooldown period then shut off (non-blocking)
variable_cooldown_time: 600
gcode:
    NEVERMORE_ON
    UPDATE_DELAYED_GCODE ID=_NEVERMORE_COOLDOWN_TIMER DURATION={printer["gcode_macro NEVERMORE_FILTER_COOLDOWN"].cooldown_time}
    RESPOND MSG="Nevermore cooldown: {printer['gcode_macro NEVERMORE_FILTER_COOLDOWN'].cooldown_time}s remaining"

