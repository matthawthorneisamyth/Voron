#[include plr.cfg]
[include mainsail.cfg]
[include macros.cfg]
[include stealthburner_leds.cfg]
[include tmc_autotune.cfg]
#####################################################################
# MCU — Voron Leviathan V1.3
#####################################################################
# Firmware: STM32F446, No bootloader, 12MHz crystal
# See docs/Config_Reference.md for parameter descriptions

[mcu]
canbus_uuid: 1ce7153ccbfd

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 25000
max_z_velocity: 50
max_z_accel: 200
square_corner_velocity: 5.0

#####################################################################
# X/Y Stepper Settings
#####################################################################

## B Stepper - Left
## Connected to HV STEPPER 0
## Endstop connected to X-ENDSTOP
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: PC1
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 75
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
#diag0_pin: ^!PG1
interpolate: false
run_current: 0.8
sense_resistor: 0.075
stealthchop_threshold: 0

## A Stepper - Right
## Connected to HV STEPPER 1
## Endstop connected to Y-ENDSTOP
[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: PC2
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 75
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
#diag0_pin: ^!PE10
interpolate: false
run_current: 0.8
sense_resistor: 0.075
stealthchop_threshold: 0

#####################################################################
# Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
## Connected to STEPPER 0
[stepper_z]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 330
position_min: -5
homing_speed: 10
#second_homing_speed: 0
#homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PD5
#diag_pin: ^!PD6
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Z1 Stepper - Rear Left
## Connected to STEPPER 1
[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PD0
#diag_pin: ^!PD1
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Z2 Stepper - Rear Right
## Connected to STEPPER 2
[stepper_z2]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PA8
#diag_pin: ^!PA15
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

## Z3 Stepper - Front Right
## Connected to STEPPER 3
[stepper_z3]
step_pin: PG7
dir_pin: PG6
enable_pin: !PC7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PG8
#diag_pin: ^!PC6
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# Extruder — on Nitehawk 36 toolhead
#####################################################################
## See nitehawk-36.cfg

#####################################################################
# Bed Heater
#####################################################################

[heater_bed]
heater_pin: PG11
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PA2
pullup_resistor: 2200
max_power: 0.99
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 42.566
#pid_ki: 1.585
#pid_kd: 285.727

#####################################################################
# Chamber Thermistor
#####################################################################

[thermistor Trianglelab-NTC100K-B3950]
temperature1: 25
resistance1: 103180
temperature2: 150
resistance2: 1366.2
temperature3: 250
resistance3: 168.6

[temperature_sensor chamber]
sensor_type: Trianglelab-NTC100K-B3950
sensor_pin: PA0
pullup_resistor: 2200
min_temp: -10
max_temp: 100

#####################################################################
# Probe — Beacon
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_9D88DCC35157355957202020FF10110E-if00
x_offset: 0
y_offset: 20.6
mesh_runs: 2
mesh_main_direction: x
contact_max_hotend_temperature: 300
home_xy_position: 175, 175
home_z_hop: 5
home_z_hop_speed: 20
home_xy_move_speed: 300
home_method: contact
home_method_when_homed: proximity
home_autocalibrate: unhomed

#####################################################################
# Fan Control
#####################################################################
## Print cooling fan and hotend fan are on Nitehawk 36 (see nitehawk-36.cfg)

## Controller/Case Fans — Leviathan FAN0
[controller_fan controller_fan]
pin: PB7
kick_start_time: 0.5
heater: heater_bed

# Exhaust Fan - Leviathan FAN1

[fan_generic exhaust_fan]
pin: PB3
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0

## Nevermore Filter — Leviathan FAN2
[fan_generic nevermore]
pin: PF7
max_power: 1.0
kick_start_time: 0.5

#####################################################################
# Filament Sensor (uncomment when installed)
#####################################################################

#[filament_switch_sensor Filament]
#pause_on_runout: True
#runout_gcode: M600
#insert_gcode:
#event_delay: 3.0
#pause_delay: 0.5
#switch_pin: !PC0

#####################################################################
# Input Shaper
#####################################################################

[input_shaper]
shaper_type_x: ei
shaper_freq_x: 79.6
shaper_type_y: mzv
shaper_freq_y: 42.0

[resonance_tester]
accel_chip: beacon
probe_points:
    175, 175, 20

#####################################################################
# LED Control
#####################################################################

## 24V Case Lights — Leviathan LED header
[output_pin caselight]
pin: PG10
pwm: true
value: 0
shutdown_value: 0
cycle_time: 0.01

#####################################################################
# Homing and Gantry Adjustment
#####################################################################

[idle_timeout]
timeout: 3600

## Quad Gantry Level — 350mm build
[quad_gantry_level]
gantry_corners:
 -60,-10
  410,420
points:
  50,25
  50,275
  300,275
  300,25
speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

#####################################################################
# Bed Mesh
#####################################################################

[bed_mesh]
speed: 250
horizontal_move_z: 15
mesh_min: 20, 20
mesh_max: 330, 330
fade_start: 0.6
fade_end: 10.0
probe_count: 15, 15
algorithm: bicubic

#####################################################################
# Firmware Retraction
#####################################################################

[firmware_retraction]
retract_length: .6
retract_speed: 120
unretract_extra_length: 0
unretract_speed: 120

########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
  EXP1_1=PG9, EXP1_2=PG12,
  EXP1_3=PG13, EXP1_4=PG14,
  EXP1_5=PC13, EXP1_6=PC14,
  EXP1_7=PC15, EXP1_8=PF0,
  EXP1_9=<GND>, EXP1_10=<5V>,
  EXP2_1=PA6, EXP2_2=PA5,
  EXP2_3=PE2, EXP2_4=PE4,
  EXP2_5=PE3, EXP2_6=PA7,
  EXP2_7=PE5, EXP2_8=<RST>,
  EXP2_9=<GND>, EXP2_10=PE4

########################################
# Misc Needed for Slicer Operations
########################################

[gcode_arcs]
resolution: 1.0

[exclude_object]

[skew_correction]

########################################
# Kliper Shake and Tune
########################################

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
number_of_results_to_keep: 10
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
keep_raw_data: False
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
max_freq: 200
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

[resonance_tester]
accel_chip: beacon
probe_points: 175, 175, 20

